<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil Docente — EduActiva 360</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --verde:#1a7a4a; --verde-claro:#22a25e; --verde-bg:#f0faf4;
  --azul-marino:#0f2d4a; --azul-medio:#1b4f72;
  --gris:#6b7280; --gris-claro:#f3f4f6; --borde:#e5e7eb;
  --rojo:#dc2626; --amarillo:#d97706; --blanco:#ffffff; --texto:#111827;
}
body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--gris-claro); color:var(--texto); }

.header { background:var(--azul-marino); padding:16px 24px; display:flex; align-items:center; justify-content:space-between; }
.header-logo { display:flex; align-items:center; gap:10px; }
.header-logo .icon { width:36px; height:36px; background:var(--verde); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:18px; }
.header-logo h1 { color:#fff; font-size:16px; font-weight:700; }
.header-logo p { color:rgba(255,255,255,0.5); font-size:11px; }
.btn-back { color:rgba(255,255,255,0.7); text-decoration:none; font-size:13px; border:1px solid rgba(255,255,255,0.3); padding:6px 14px; border-radius:6px; }

.container { max-width:1100px; margin:0 auto; padding:24px; }

.panel { background:var(--blanco); border-radius:12px; border:1px solid var(--borde); margin-bottom:20px; }
.panel-header { padding:18px 22px; border-bottom:1px solid var(--borde); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
.panel-header h3 { font-size:16px; font-weight:600; }
.panel-body { padding:22px; }

.form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
.form-row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; margin-bottom:16px; }
.form-field label { display:block; font-size:13px; font-weight:500; margin-bottom:5px; color:var(--azul-marino); }
.form-field input, .form-field select {
  width:100%; padding:10px 12px;
  border:1.5px solid var(--borde); border-radius:8px;
  font-size:14px; outline:none;
}
.form-field input:focus, .form-field select:focus { border-color:var(--verde); }

.btn-primary { padding:11px 22px; background:var(--verde); color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; }
.btn-primary:hover { background:var(--verde-claro); }
.btn-secondary { padding:11px 22px; background:transparent; color:var(--gris); border:1.5px solid var(--borde); border-radius:8px; font-size:14px; cursor:pointer; margin-right:8px; }
.btn-danger { padding:6px 12px; background:transparent; color:var(--rojo); border:1px solid var(--rojo); border-radius:6px; font-size:12px; cursor:pointer; }
.btn-edit { padding:6px 12px; background:transparent; color:var(--azul-medio); border:1px solid var(--azul-medio); border-radius:6px; font-size:12px; cursor:pointer; }

.alert { padding:12px 16px; border-radius:8px; font-size:14px; margin-bottom:16px; display:none; }
.alert-success { background:#d1fae5; color:#065f46; border:1px solid #a7f3d0; }
.alert-error { background:#fee2e2; color:#991b1b; border:1px solid #fecaca; }

/* Checkboxes de áreas */
.areas-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(220px,1fr)); gap:10px; margin-top:8px; }
.area-check { display:flex; align-items:center; gap:8px; padding:8px 12px; border:1.5px solid var(--borde); border-radius:8px; cursor:pointer; transition:all .15s; }
.area-check:hover { border-color:var(--verde); background:var(--verde-bg); }
.area-check input[type=checkbox] { width:16px; height:16px; accent-color:var(--verde); cursor:pointer; }
.area-check label { font-size:13px; cursor:pointer; }
.area-check.checked { border-color:var(--verde); background:var(--verde-bg); }

/* Grados seleccionables */
.grados-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:8px; margin-top:8px; }
.grado-check { display:flex; align-items:center; gap:8px; padding:6px 10px; border:1.5px solid var(--borde); border-radius:6px; cursor:pointer; }
.grado-check:hover { border-color:var(--azul-medio); }
.grado-check input[type=checkbox] { accent-color:var(--azul-medio); }

/* Cards de docentes */
.docente-card {
  border:1px solid var(--borde); border-radius:10px;
  padding:16px; margin-bottom:12px;
  display:flex; align-items:flex-start; justify-content:space-between;
  gap:16px; flex-wrap:wrap;
}
.docente-avatar {
  width:48px; height:48px; background:var(--azul-marino);
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:20px; color:#fff; flex-shrink:0;
}
.docente-info { flex:1; min-width:200px; }
.docente-nombre { font-size:16px; font-weight:700; margin-bottom:4px; }
.docente-cedula { font-size:12px; color:var(--gris); margin-bottom:8px; }
.docente-tags { display:flex; flex-wrap:wrap; gap:6px; }
.tag { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }
.tag-verde { background:#d1fae5; color:#065f46; }
.tag-azul { background:#dbeafe; color:#1e40af; }
.tag-gris { background:#f3f4f6; color:#374151; }
.tag-amarillo { background:#fef3c7; color:#92400e; }
.docente-acciones { display:flex; gap:6px; align-items:center; }

/* Tabla de carga */
.carga-tabla { width:100%; border-collapse:collapse; font-size:13px; }
.carga-tabla th { background:var(--azul-marino); color:#fff; padding:8px 12px; text-align:left; font-size:12px; }
.carga-tabla td { padding:8px 12px; border-bottom:1px solid var(--borde); }
.carga-tabla tr:last-child td { border-bottom:none; }
.carga-total td { background:#f0faf4; font-weight:700; }

/* Modal */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200; align-items:center; justify-content:center; }
.modal-overlay.active { display:flex; }
.modal { background:#fff; border-radius:16px; padding:28px; width:90%; max-width:600px; max-height:80vh; overflow-y:auto; }
.modal h3 { font-size:18px; font-weight:700; margin-bottom:20px; color:var(--azul-marino); }
.modal-footer { display:flex; gap:8px; margin-top:20px; justify-content:flex-end; }

@media (max-width:768px) {
  .form-row, .form-row-3 { grid-template-columns:1fr; }
  .container { padding:16px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">
    <div class="icon">👨‍🏫</div>
    <div>
      <h1>Perfil Docente</h1>
      <p>EduActiva 360 · Gestión de Personal</p>
    </div>
  </div>
  <a href="dashboard.html" class="btn-back">← Volver al Dashboard</a>
</div>

<div class="container">

  <!-- REGISTRAR DOCENTE -->
  <div class="panel">
    <div class="panel-header"><h3>➕ Registrar docente</h3></div>
    <div class="panel-body">
      <div class="alert alert-success" id="doc-success"></div>
      <div class="alert alert-error" id="doc-error"></div>

      <div class="form-row">
        <div class="form-field">
          <label>Nombre</label>
          <input type="text" id="doc-nombre" placeholder="Nombre del docente">
        </div>
        <div class="form-field">
          <label>Apellido</label>
          <input type="text" id="doc-apellido" placeholder="Apellido del docente">
        </div>
      </div>

      <div class="form-row">
        <div class="form-field">
          <label>Cédula</label>
          <input type="text" id="doc-cedula" placeholder="000-0000000-0">
        </div>
        <div class="form-field">
          <label>Correo institucional</label>
          <input type="email" id="doc-correo" placeholder="docente@centro.edu.do">
        </div>
      </div>

      <div class="form-row">
        <div class="form-field">
          <label>Teléfono</label>
          <input type="text" id="doc-tel" placeholder="809-000-0000">
        </div>
        <div class="form-field">
          <label>Especialidad / Título</label>
          <input type="text" id="doc-titulo" placeholder="Ej: Licenciado en Educación Primaria">
        </div>
      </div>

      <div class="form-row">
        <div class="form-field">
          <label>Turno</label>
          <select id="doc-turno">
            <option value="Matutino">Matutino</option>
            <option value="Vespertino">Vespertino</option>
            <option value="Nocturno">Nocturno</option>
            <option value="Extendido">Jornada Extendida</option>
          </select>
        </div>
        <div class="form-field">
          <label>Tipo de jornada</label>
          <select id="doc-jornada">
            <option value="extendida">Extendida (40h/semana)</option>
            <option value="regular">Regular (25h/semana)</option>
          </select>
        </div>
      </div>

      <!-- Áreas que imparte -->
      <div style="margin-bottom:16px;">
        <label style="display:block;font-size:13px;font-weight:600;margin-bottom:8px;color:var(--azul-marino);">📚 Áreas curriculares que imparte</label>
        <div class="areas-grid" id="areas-check"></div>
      </div>

      <!-- Grados asignados -->
      <div style="margin-bottom:16px;">
        <label style="display:block;font-size:13px;font-weight:600;margin-bottom:8px;color:var(--azul-marino);">🏫 Grados asignados</label>
        <div class="grados-grid" id="grados-check"></div>
      </div>

      <div class="form-row">
        <div class="form-field">
          <label>Carga horaria semanal total</label>
          <input type="number" id="doc-carga" placeholder="Ej: 30" min="1" max="40">
        </div>
        <div class="form-field">
          <label>Secciones a cargo</label>
          <input type="text" id="doc-secciones" placeholder="Ej: 3ro A, 4to B, 5to A">
        </div>
      </div>

      <button class="btn-secondary" onclick="limpiarDocForm()">Limpiar</button>
      <button class="btn-primary" onclick="registrarDocente()">💾 Registrar docente</button>
    </div>
  </div>

  <!-- LISTA DE DOCENTES -->
  <div class="panel">
    <div class="panel-header">
      <h3>👥 Personal docente registrado</h3>
      <div style="display:flex;gap:8px;">
        <input type="text" id="buscar-doc" oninput="renderDocentes()" placeholder="🔍 Buscar docente..." style="padding:7px 12px;border:1px solid var(--borde);border-radius:8px;font-size:13px;outline:none;">
      </div>
    </div>
    <div class="panel-body" id="doc-lista">
      <p style="color:var(--gris);text-align:center;padding:30px;">No hay docentes registrados aún.</p>
    </div>
  </div>

  <!-- RESUMEN DE CARGA -->
  <div class="panel">
    <div class="panel-header"><h3>📊 Resumen de carga horaria del centro</h3></div>
    <div class="panel-body" id="carga-resumen">
      <p style="color:var(--gris);text-align:center;padding:20px;">Registra docentes para ver el resumen de carga.</p>
    </div>
  </div>

</div>

<!-- MODAL VER DOCENTE -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3 id="modal-titulo">Perfil del docente</h3>
    <div id="modal-contenido"></div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="cerrarModal()">Cerrar</button>
    </div>
  </div>
</div>

<script>
const AREAS_DISPONIBLES = [
  'Lengua Española', 'Matemática', 'Ciencias Sociales', 'Ciencias de la Naturaleza',
  'Formación Integral Humana y Religiosa', 'Educación Física', 'Educación Artística',
  'Lenguas Extranjeras (Inglés)', 'Lenguas Extranjeras (Francés)',
  'Tecnología e Informática', 'Filosofía', 'Formación Técnico-Profesional',
  'Cursos y talleres optativos'
];

const GRADOS_DISPONIBLES = [
  '1er grado', '2do grado', '3er grado', '4to grado', '5to grado', '6to grado',
  '1er grado Secundario', '2do grado Secundario', '3er grado Secundario',
  '4to grado Secundario', '5to grado Secundario', '6to grado Secundario'
];

// Inicializar checkboxes de áreas
function initAreas() {
  var el = document.getElementById('areas-check');
  el.innerHTML = AREAS_DISPONIBLES.map(function(a) {
    return '<div class="area-check" id="wrap-' + a.replace(/\s/g,'_') + '" onclick="toggleArea(this)">'
      + '<input type="checkbox" id="area-' + a.replace(/\s/g,'_') + '" value="' + a + '">'
      + '<label for="area-' + a.replace(/\s/g,'_') + '">' + a + '</label></div>';
  }).join('');
}

function toggleArea(wrap) {
  var cb = wrap.querySelector('input[type=checkbox]');
  cb.checked = !cb.checked;
  wrap.classList.toggle('checked', cb.checked);
}

function initGrados() {
  var el = document.getElementById('grados-check');
  el.innerHTML = GRADOS_DISPONIBLES.map(function(g) {
    return '<div class="grado-check">'
      + '<input type="checkbox" id="grado-' + g.replace(/\s/g,'_') + '" value="' + g + '">'
      + '<label for="grado-' + g.replace(/\s/g,'_') + '" style="font-size:13px;cursor:pointer;">' + g + '</label></div>';
  }).join('');
}

function getAreasSeleccionadas() {
  return AREAS_DISPONIBLES.filter(function(a) {
    var cb = document.getElementById('area-' + a.replace(/\s/g,'_'));
    return cb && cb.checked;
  });
}

function getGradosSeleccionados() {
  return GRADOS_DISPONIBLES.filter(function(g) {
    var cb = document.getElementById('grado-' + g.replace(/\s/g,'_'));
    return cb && cb.checked;
  });
}

function registrarDocente() {
  var nombre = document.getElementById('doc-nombre').value.trim();
  var apellido = document.getElementById('doc-apellido').value.trim();
  var cedula = document.getElementById('doc-cedula').value.trim();
  var correo = document.getElementById('doc-correo').value.trim();
  var areas = getAreasSeleccionadas();
  var grados = getGradosSeleccionados();

  if (!nombre || !apellido) { showAlert('doc-error', '⚠️ Nombre y apellido son obligatorios.'); return; }
  if (areas.length === 0) { showAlert('doc-error', '⚠️ Selecciona al menos un área curricular.'); return; }
  if (grados.length === 0) { showAlert('doc-error', '⚠️ Selecciona al menos un grado asignado.'); return; }

  var docentes = JSON.parse(localStorage.getItem('ea_docentes') || '[]');

  // Verificar cédula duplicada
  if (cedula && docentes.find(function(d) { return d.cedula === cedula; })) {
    showAlert('doc-error', '⚠️ Ya existe un docente con esa cédula.'); return;
  }

  var doc = {
    id: Date.now(),
    nombre: nombre, apellido: apellido, cedula: cedula,
    correo: correo,
    tel: document.getElementById('doc-tel').value.trim(),
    titulo: document.getElementById('doc-titulo').value.trim(),
    turno: document.getElementById('doc-turno').value,
    jornada: document.getElementById('doc-jornada').value,
    areas: areas, grados: grados,
    carga: document.getElementById('doc-carga').value || areas.length * 2,
    secciones: document.getElementById('doc-secciones').value.trim(),
    fechaRegistro: new Date().toLocaleDateString('es-DO')
  };

  docentes.push(doc);
  localStorage.setItem('ea_docentes', JSON.stringify(docentes));
  showAlert('doc-success', '✅ Docente "' + nombre + ' ' + apellido + '" registrado correctamente.');
  limpiarDocForm();
  renderDocentes();
  renderCargaResumen();
}

function limpiarDocForm() {
  ['doc-nombre','doc-apellido','doc-cedula','doc-correo','doc-tel','doc-titulo','doc-carga','doc-secciones'].forEach(function(id) {
    document.getElementById(id).value = '';
  });
  // Limpiar checkboxes
  AREAS_DISPONIBLES.forEach(function(a) {
    var cb = document.getElementById('area-' + a.replace(/\s/g,'_'));
    var wrap = document.getElementById('wrap-' + a.replace(/\s/g,'_'));
    if (cb) cb.checked = false;
    if (wrap) wrap.classList.remove('checked');
  });
  GRADOS_DISPONIBLES.forEach(function(g) {
    var cb = document.getElementById('grado-' + g.replace(/\s/g,'_'));
    if (cb) cb.checked = false;
  });
}

function renderDocentes() {
  var buscar = (document.getElementById('buscar-doc').value || '').toLowerCase();
  var docentes = JSON.parse(localStorage.getItem('ea_docentes') || '[]');
  if (buscar) docentes = docentes.filter(function(d) {
    return (d.nombre + ' ' + d.apellido).toLowerCase().includes(buscar);
  });

  var el = document.getElementById('doc-lista');
  if (docentes.length === 0) {
    el.innerHTML = '<p style="color:var(--gris);text-align:center;padding:30px;">No hay docentes registrados aún.</p>';
    return;
  }

  el.innerHTML = docentes.map(function(d) {
    var iniciales = d.nombre[0] + d.apellido[0];
    var areasHTML = d.areas.slice(0,3).map(function(a) {
      return '<span class="tag tag-azul">' + a + '</span>';
    }).join('') + (d.areas.length > 3 ? '<span class="tag tag-gris">+' + (d.areas.length-3) + ' más</span>' : '');
    var gradosHTML = d.grados.slice(0,3).map(function(g) {
      return '<span class="tag tag-verde">' + g + '</span>';
    }).join('') + (d.grados.length > 3 ? '<span class="tag tag-gris">+' + (d.grados.length-3) + '</span>' : '');

    return '<div class="docente-card">'
      + '<div class="docente-avatar">' + iniciales + '</div>'
      + '<div class="docente-info">'
      + '<div class="docente-nombre">' + d.nombre + ' ' + d.apellido + '</div>'
      + '<div class="docente-cedula">' + (d.cedula||'Sin cédula') + ' · ' + d.turno + ' · Jornada ' + d.jornada + ' · ' + d.carga + 'h/sem</div>'
      + '<div class="docente-tags" style="margin-bottom:6px;">' + areasHTML + '</div>'
      + '<div class="docente-tags">' + gradosHTML + '</div>'
      + '</div>'
      + '<div class="docente-acciones">'
      + '<button class="btn-edit" onclick="verDocente(' + d.id + ')">👁️ Ver</button>'
      + '<button class="btn-danger" onclick="eliminarDocente(' + d.id + ')">🗑️</button>'
      + '</div></div>';
  }).join('');
}

function verDocente(id) {
  var d = JSON.parse(localStorage.getItem('ea_docentes') || '[]').find(function(x) { return x.id === id; });
  if (!d) return;
  document.getElementById('modal-titulo').textContent = d.nombre + ' ' + d.apellido;
  document.getElementById('modal-contenido').innerHTML =
    '<table style="width:100%;border-collapse:collapse;font-size:14px;">'
    + '<tr><td style="padding:8px;color:var(--gris);width:140px;">Cédula</td><td style="padding:8px;font-weight:600;">' + (d.cedula||'—') + '</td></tr>'
    + '<tr style="background:#f9fafb;"><td style="padding:8px;color:var(--gris);">Correo</td><td style="padding:8px;">' + (d.correo||'—') + '</td></tr>'
    + '<tr><td style="padding:8px;color:var(--gris);">Teléfono</td><td style="padding:8px;">' + (d.tel||'—') + '</td></tr>'
    + '<tr style="background:#f9fafb;"><td style="padding:8px;color:var(--gris);">Título</td><td style="padding:8px;">' + (d.titulo||'—') + '</td></tr>'
    + '<tr><td style="padding:8px;color:var(--gris);">Turno</td><td style="padding:8px;">' + d.turno + '</td></tr>'
    + '<tr style="background:#f9fafb;"><td style="padding:8px;color:var(--gris);">Jornada</td><td style="padding:8px;">' + d.jornada + '</td></tr>'
    + '<tr><td style="padding:8px;color:var(--gris);">Carga horaria</td><td style="padding:8px;font-weight:700;color:var(--verde);">' + d.carga + ' horas/semana</td></tr>'
    + '<tr style="background:#f9fafb;"><td style="padding:8px;color:var(--gris);">Secciones</td><td style="padding:8px;">' + (d.secciones||'—') + '</td></tr>'
    + '<tr><td style="padding:8px;color:var(--gris);vertical-align:top;">Áreas</td><td style="padding:8px;">' + d.areas.map(function(a) { return '<span class="tag tag-azul" style="margin:2px;">' + a + '</span>'; }).join('') + '</td></tr>'
    + '<tr style="background:#f9fafb;"><td style="padding:8px;color:var(--gris);vertical-align:top;">Grados</td><td style="padding:8px;">' + d.grados.map(function(g) { return '<span class="tag tag-verde" style="margin:2px;">' + g + '</span>'; }).join('') + '</td></tr>'
    + '<tr><td style="padding:8px;color:var(--gris);">Registro</td><td style="padding:8px;">' + d.fechaRegistro + '</td></tr>'
    + '</table>';
  document.getElementById('modal-overlay').classList.add('active');
}

function cerrarModal() {
  document.getElementById('modal-overlay').classList.remove('active');
}

function eliminarDocente(id) {
  if (!confirm('¿Eliminar este docente del registro?')) return;
  var docentes = JSON.parse(localStorage.getItem('ea_docentes') || '[]').filter(function(d) { return d.id !== id; });
  localStorage.setItem('ea_docentes', JSON.stringify(docentes));
  renderDocentes();
  renderCargaResumen();
}

function renderCargaResumen() {
  var docentes = JSON.parse(localStorage.getItem('ea_docentes') || '[]');
  var el = document.getElementById('carga-resumen');
  if (docentes.length === 0) {
    el.innerHTML = '<p style="color:var(--gris);text-align:center;padding:20px;">Registra docentes para ver el resumen de carga.</p>';
    return;
  }

  // Contar horas por área
  var porArea = {};
  docentes.forEach(function(d) {
    d.areas.forEach(function(a) {
      if (!porArea[a]) porArea[a] = { docentes: [], horas: 0 };
      porArea[a].docentes.push(d.nombre + ' ' + d.apellido);
      porArea[a].horas += parseInt(d.carga) || 0;
    });
  });

  var totalHoras = docentes.reduce(function(s,d) { return s + (parseInt(d.carga)||0); }, 0);

  var html = '<table class="carga-tabla"><thead><tr><th>Área curricular</th><th>Docentes asignados</th><th>Carga total (h/sem)</th></tr></thead><tbody>';
  Object.keys(porArea).forEach(function(area) {
    var data = porArea[area];
    html += '<tr><td><strong>' + area + '</strong></td><td>' + data.docentes.join(', ') + '</td><td>' + data.horas + 'h</td></tr>';
  });
  html += '<tr class="carga-total"><td>TOTAL PERSONAL DOCENTE: ' + docentes.length + ' docentes</td><td></td><td>' + totalHoras + 'h</td></tr>';
  html += '</tbody></table>';
  el.innerHTML = html;
}

function showAlert(id, msg) {
  var el = document.getElementById(id);
  el.textContent = msg; el.style.display = 'block';
  setTimeout(function() { el.style.display = 'none'; }, 4000);
}

// Cerrar modal al hacer clic fuera
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) cerrarModal();
});

// Inicializar
initAreas();
initGrados();
renderDocentes();
renderCargaResumen();
</script>
</body>
