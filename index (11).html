<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduActiva 360 — Acceso</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --verde:    #1A7F5A;
      --verde-claro: #23A876;
      --verde-bg: #F0FAF5;
      --gris:     #6B7280;
      --gris-borde: #D1D5DB;
      --negro:    #111827;
      --blanco:   #FFFFFF;
      --error:    #DC2626;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--verde-bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .tarjeta {
      background: var(--blanco);
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(26,127,90,0.10);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 2rem;
    }

    .logo-icono {
      width: 40px;
      height: 40px;
      background: var(--verde);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icono svg { width: 22px; height: 22px; fill: white; }

    .logo-texto {
      font-family: 'Sora', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--negro);
      line-height: 1.1;
    }

    .logo-texto span {
      display: block;
      font-size: 0.7rem;
      font-weight: 400;
      font-family: 'Inter', sans-serif;
      color: var(--gris);
      letter-spacing: 0.04em;
    }

    h1 {
      font-family: 'Sora', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--negro);
      margin-bottom: 0.3rem;
    }

    .subtitulo {
      color: var(--gris);
      font-size: 0.9rem;
      margin-bottom: 1.8rem;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--negro);
      margin-bottom: 0.4rem;
    }

    input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid var(--gris-borde);
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      color: var(--negro);
      background: var(--blanco);
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 1.1rem;
    }

    input:focus { border-color: var(--verde); }

    .btn {
      width: 100%;
      padding: 0.85rem;
      background: var(--verde);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.5rem;
    }

    .btn:hover { background: var(--verde-claro); }
    .btn:disabled { background: var(--gris-borde); cursor: not-allowed; }

    .mensaje-error {
      background: #FEF2F2;
      border: 1px solid #FECACA;
      color: var(--error);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
      margin-top: 1rem;
      display: none;
    }

    .mensaje-error.visible { display: block; }

    .pie {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: var(--gris);
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="tarjeta">
  <div class="logo">
    <div class="logo-icono">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/>
      </svg>
    </div>
    <div class="logo-texto">
      EduActiva 360
      <span>Sistema de Gestión Educativa</span>
    </div>
  </div>

  <h1>Iniciar sesión</h1>
  <p class="subtitulo">Accede a tu plataforma educativa</p>

  <div>
    <label for="email">Correo electrónico</label>
    <input type="email" id="email" placeholder="director@centro.edu.do" autocomplete="email"/>

    <label for="password">Contraseña</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>

    <button class="btn" id="btnLogin" onclick="iniciarSesion()">Entrar</button>

    <div class="mensaje-error" id="error"></div>
  </div>

  <p class="pie">República Dominicana · MINERD</p>
</div>

<script>
  const API = 'https://eduactiva360-backend-production.up.railway.app';

  async function iniciarSesion() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('btnLogin');
    const errorEl  = document.getElementById('error');

    errorEl.classList.remove('visible');

    if (!email || !password) {
      mostrarError('Completa todos los campos.');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Verificando...';

    try {
      const res = await fetch(`${API}/api/v1/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (!res.ok) {
        mostrarError(data.message || 'Credenciales incorrectas.');
        return;
      }

      localStorage.setItem('token', data.access_token);
      localStorage.setItem('usuario', JSON.stringify(data.user || {}));
      window.location.href = 'dashboard.html';

    } catch (err) {
      mostrarError('No se pudo conectar con el servidor. Intenta de nuevo.');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Entrar';
    }
  }

  function mostrarError(msg) {
    const el = document.getElementById('error');
    el.textContent = msg;
    el.classList.add('visible');
  }

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') iniciarSesion();
  });
</script>

</body>
</html>
